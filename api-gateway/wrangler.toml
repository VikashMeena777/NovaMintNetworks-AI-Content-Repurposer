name = "clipmint-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Environment variables — set via `wrangler secret put`
# SUPABASE_URL
# SUPABASE_SERVICE_KEY
# GITHUB_TOKEN
# GITHUB_REPO (e.g. "username/13-ClipMint")

[vars]
CORS_ORIGIN = "https://ai-content-repurposer-beta.vercel.app"
RATE_LIMIT_PER_MINUTE = 30

# KV namespace for rate limiting and caching
[[kv_namespaces]]
binding = "CACHE"
id = "55b5044b918345eabcadd5bc6868410b"
