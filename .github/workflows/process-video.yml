# ClipMint — Video Processing Pipeline
#
# Triggered by API Gateway (workflow_dispatch) or manual trigger.
# Downloads video → transcribes → AI analysis → clips → captions → uploads
#
name: Process Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Supabase job ID"
        required: true
        type: string
      video_url:
        description: "Video URL to process (YouTube, Instagram, etc.)"
        required: true
        type: string
      caption_style:
        description: "Caption style preset"
        required: false
        default: "hormozi"
        type: choice
        options:
          - hormozi
          - bounce
          - fade
          - glow
          - typewriter
          - glitch
          - neon
          - colorful
          - minimal
      max_clips:
        description: "Maximum number of clips to generate"
        required: false
        default: "10"
        type: string

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  FFMPEG_THREADS: "2"

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      # ─────────────────────────────────────────────────────────────
      # 1. Setup
      # ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: remotion-captions/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick rclone
          pip install -U yt-dlp requests
          # Install Deno (required for yt-dlp --js-runtimes deno)
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Install Remotion dependencies
        working-directory: remotion-captions
        run: npm ci --legacy-peer-deps

      - name: Update job status → downloading
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s -X PATCH "$SUPABASE_URL/rest/v1/jobs?id=eq.${{ inputs.job_id }}" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "downloading", "progress": 5, "started_at": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}'

      # ─────────────────────────────────────────────────────────────
      # 2. Download Source Video
      # ─────────────────────────────────────────────────────────────
      - name: Download video
        id: download
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          mkdir -p workspace/source workspace/audio workspace/clips workspace/captioned workspace/thumbnails

          echo "📥 Downloading: ${{ inputs.video_url }}"

          # Write raw cookie file (Netscape format) — no base64 decode
          printf '%s' "$YOUTUBE_COOKIES" > /tmp/yt_cookies.txt

          yt-dlp \
            --js-runtimes deno \
            --remote-components "ejs:github" \
            --format "bestvideo[height<=1080]+bestaudio/best[height<=1080]/best" \
            --merge-output-format mp4 \
            --output "workspace/source/source.mp4" \
            --no-playlist \
            --socket-timeout 60 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --sleep-interval 1 \
            --max-sleep-interval 3 \
            $( [ -s /tmp/yt_cookies.txt ] && echo "--cookies /tmp/yt_cookies.txt" ) \
            "${{ inputs.video_url }}"

          DURATION=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 workspace/source/source.mp4)
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "✅ Downloaded. Duration: ${DURATION}s"

      # ─────────────────────────────────────────────────────────────
      # 3. Extract Audio for Transcription
      # ─────────────────────────────────────────────────────────────
      - name: Extract audio
        run: |
          echo "🎵 Extracting audio..."
          ffmpeg -i workspace/source/source.mp4 \
            -vn -acodec pcm_s16le -ar 16000 -ac 1 \
            workspace/audio/audio.wav \
            -y -loglevel warning
          echo "✅ Audio extracted"

      - name: Update job status → transcribing
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s -X PATCH "$SUPABASE_URL/rest/v1/jobs?id=eq.${{ inputs.job_id }}" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "transcribing", "progress": 20}'

      # ─────────────────────────────────────────────────────────────
      # 4. Transcribe with Groq Whisper API
      # ─────────────────────────────────────────────────────────────
      - name: Transcribe audio
        id: transcribe
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "🗣️ Transcribing audio with Groq Whisper (verbose_json + word timestamps)..."

          # Split audio into 25MB chunks if needed (Groq limit)
          FILE_SIZE=$(stat --printf="%s" workspace/audio/audio.wav)
          MAX_SIZE=25000000
          SEGMENT_DURATION=300

          echo "📁 Audio file size: $FILE_SIZE bytes"

          if [ "$FILE_SIZE" -gt "$MAX_SIZE" ]; then
            echo "⚠️ Audio file too large ($FILE_SIZE bytes), splitting into 5-min chunks..."
            ffmpeg -i workspace/audio/audio.wav -f segment -segment_time $SEGMENT_DURATION \
              -c copy workspace/audio/chunk_%03d.wav -y -loglevel warning
          else
            cp workspace/audio/audio.wav workspace/audio/chunk_000.wav
          fi

          # Initialize empty captions array
          echo '[]' > workspace/audio/full_captions.json
          CHUNK_INDEX=0
          TRANSCRIPTION_FAILED=0

          for chunk in workspace/audio/chunk_*.wav; do
            CHUNK_SIZE=$(stat --printf="%s" "$chunk")
            OFFSET=$((CHUNK_INDEX * SEGMENT_DURATION))
            echo "  Transcribing $chunk (size: ${CHUNK_SIZE} bytes, offset: ${OFFSET}s)..."

            # Request verbose_json with word-level timestamps
            HTTP_STATUS=$(curl -s -o /tmp/chunk_raw.json -w "%{http_code}" \
              -X POST "https://api.groq.com/openai/v1/audio/transcriptions" \
              -H "Authorization: Bearer $GROQ_API_KEY" \
              -F "file=@$chunk" \
              -F "model=whisper-large-v3-turbo" \
              -F "response_format=verbose_json" \
              -F "timestamp_granularities[]=word" \
              )

            echo "  Groq HTTP status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "  ❌ Groq API error (HTTP $HTTP_STATUS):"
              cat /tmp/chunk_raw.json
              TRANSCRIPTION_FAILED=1
              break
            fi

            # Validate response has expected JSON structure
            if ! python3 -c "import json,sys; d=json.load(open('/tmp/chunk_raw.json')); assert 'words' in d or 'segments' in d" 2>/dev/null; then
              echo "  ❌ Groq response missing words/segments:"
              cat /tmp/chunk_raw.json
              TRANSCRIPTION_FAILED=1
              break
            fi

            # Convert verbose_json → Caption[] and append to full_captions.json
            python3 - <<PYCONVERT
          import json

          offset = $OFFSET  # seconds, already an int from shell

          with open('/tmp/chunk_raw.json') as f:
              data = json.load(f)

          captions = []

          if 'words' in data and data['words']:
              # Preferred: per-word timestamps
              for w in data['words']:
                  captions.append({
                      'text': w.get('word', w.get('text', '')).strip(),
                      'startMs': int((w['start'] + offset) * 1000),
                      'endMs':   int((w['end']   + offset) * 1000),
                      'timestampMs': None,
                      'confidence': None
                  })
              print(f'  ✅ Word-level captions: {len(captions)} words')
          elif 'segments' in data and data['segments']:
              # Fallback: distribute each segment text evenly across its time range
              for seg in data['segments']:
                  words = seg['text'].strip().split()
                  n = max(1, len(words))
                  seg_start = seg['start'] + offset
                  seg_end   = seg['end']   + offset
                  dur = (seg_end - seg_start) / n
                  for i, w in enumerate(words):
                      captions.append({
                          'text': w,
                          'startMs': int((seg_start + i * dur) * 1000),
                          'endMs':   int((seg_start + (i + 1) * dur) * 1000),
                          'timestampMs': None,
                          'confidence': None
                      })
              print(f'  ⚠️ Fallback segment distribution: {len(captions)} words')
          else:
              print('  ❌ No words or segments found in response')
              exit(1)

          if captions:
              print(f'  First 3 words: {[c["text"] for c in captions[:3]]}')

          # Merge into accumulator
          with open('workspace/audio/full_captions.json') as f:
              existing = json.load(f)
          existing.extend(captions)
          with open('workspace/audio/full_captions.json', 'w') as f:
              json.dump(existing, f)
          PYCONVERT

            CHUNK_INDEX=$((CHUNK_INDEX + 1))
          done

          if [ "$TRANSCRIPTION_FAILED" = "1" ]; then
            echo "❌ Transcription failed — aborting pipeline"
            exit 1
          fi

          TOTAL_WORDS=$(python3 -c "import json; print(len(json.load(open('workspace/audio/full_captions.json'))))")
          echo "✅ Transcription complete: ${TOTAL_WORDS} words across $(ls workspace/audio/chunk_*.wav | wc -l) chunk(s)"
          echo "captions_path=workspace/audio/full_captions.json" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────────────────────
      # 4b. Transliterate Devanagari → Hinglish via Groq LLM
      # ─────────────────────────────────────────────────────────────
      - name: Transliterate to Hinglish (LLM)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "🔤 Transliterating Devanagari text to Hinglish via Groq LLM..."

          python3 << 'TRANSLITERATE'
          import json, re, os, requests, time

          groq_key = os.environ["GROQ_API_KEY"]

          with open('workspace/audio/full_captions.json') as f:
              captions = json.load(f)

          # Detect if any Devanagari characters exist
          devanagari_re = re.compile(r'[\u0900-\u097F]')
          hindi_words = [c for c in captions if devanagari_re.search(c.get('text', ''))]

          if not hindi_words:
              print("✅ No Devanagari text found — skipping transliteration")
              exit(0)

          print(f"  Found {len(hindi_words)}/{len(captions)} words in Devanagari — transliterating...")

          # Batch transliterate in chunks of 200 words for efficiency
          BATCH_SIZE = 200
          hindi_indices = [i for i, c in enumerate(captions) if devanagari_re.search(c.get('text', ''))]

          for batch_start in range(0, len(hindi_indices), BATCH_SIZE):
              batch_idx = hindi_indices[batch_start:batch_start + BATCH_SIZE]
              batch_words = [captions[i]['text'] for i in batch_idx]
              words_str = '\n'.join(f"{j+1}. {w}" for j, w in enumerate(batch_words))

              prompt = f"""Convert these Hindi (Devanagari) words to natural Hinglish (romanized Hindi as Indians actually type/text it).

          Rules:
          - Write how Indians naturally type Hindi in Latin script (WhatsApp/Instagram style)
          - Do NOT translate to English. Keep the Hindi word, just romanize it.
          - Example: कैसे → kaise, बहुत → bohot, क्या → kya, लेकिन → lekin
          - Return ONLY a JSON array of strings in the same order, nothing else.

          Words:
          {words_str}"""

              for attempt in range(3):
                  try:
                      resp = requests.post(
                          "https://api.groq.com/openai/v1/chat/completions",
                          headers={"Authorization": f"Bearer {groq_key}", "Content-Type": "application/json"},
                          json={
                              "model": "llama-3.3-70b-versatile",
                              "messages": [
                                  {"role": "system", "content": "You convert Devanagari text to natural Hinglish romanization. Return ONLY a JSON array."},
                                  {"role": "user", "content": prompt}
                              ],
                              "temperature": 0.2,
                              "max_tokens": 2048,
                              "response_format": {"type": "json_object"}
                          },
                          timeout=60
                      )
                      if resp.status_code == 200:
                          content = resp.json()["choices"][0]["message"]["content"]
                          parsed = json.loads(content)
                          # Handle both {"words": [...]} and [...] formats
                          if isinstance(parsed, dict):
                              romanized = list(parsed.values())[0] if parsed else []
                          else:
                              romanized = parsed

                          if len(romanized) == len(batch_idx):
                              for idx, roman_word in zip(batch_idx, romanized):
                                  captions[idx]['text'] = str(roman_word).strip()
                              print(f"  ✅ Batch {batch_start//BATCH_SIZE + 1}: transliterated {len(batch_idx)} words")
                              break
                          else:
                              print(f"  ⚠️ Length mismatch: expected {len(batch_idx)}, got {len(romanized)}. Retrying...")
                      elif resp.status_code in [429, 500, 502, 503]:
                          time.sleep(2 ** attempt * 3)
                      else:
                          print(f"  ❌ Groq error {resp.status_code}: {resp.text[:200]}")
                          break
                  except Exception as e:
                      print(f"  ⚠️ Error: {e}")
                      if attempt < 2:
                          time.sleep(2 ** attempt * 3)

          with open('workspace/audio/full_captions.json', 'w') as f:
              json.dump(captions, f)

          # Verify no Devanagari remains
          remaining = sum(1 for c in captions if devanagari_re.search(c.get('text', '')))
          print(f"✅ Transliteration complete. Remaining Devanagari words: {remaining}")
          TRANSLITERATE


      # ─────────────────────────────────────────────────────────────
      # 4c. Audio Energy Analysis (Tier 1.3)
      # ─────────────────────────────────────────────────────────────
      - name: Analyze audio energy
        run: |
          echo "🔊 Analyzing audio energy levels..."
          ffmpeg -i workspace/audio/audio.wav \
            -af "astats=metadata=1:reset=1,ametadata=print:key=lavfi.astats.Overall.RMS_level:file=workspace/audio/energy.txt" \
            -f null - 2>/dev/null
          echo "✅ Audio energy analysis complete"

      # ─────────────────────────────────────────────────────────────
      # 4d. Silence Detection for Clean Cut Points (Tier 1.4)
      # ─────────────────────────────────────────────────────────────
      - name: Detect silence gaps
        run: |
          echo "🔇 Detecting silence gaps for clean clip boundaries..."
          ffmpeg -i workspace/audio/audio.wav \
            -af "silencedetect=noise=-35dB:d=0.3" \
            -f null - 2>&1 | grep "silence_" > workspace/audio/silences.txt || true
          SILENCE_COUNT=$(wc -l < workspace/audio/silences.txt)
          echo "✅ Found $SILENCE_COUNT silence markers"

      - name: Update job status → analyzing
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s -X PATCH "$SUPABASE_URL/rest/v1/jobs?id=eq.${{ inputs.job_id }}" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "analyzing", "progress": 40}'

      # ─────────────────────────────────────────────────────────────
      # 5. AI Analysis — Find Viral Moments (Python — no shell escaping issues)
      # ─────────────────────────────────────────────────────────────
      - name: AI viral moment detection
        id: ai_analysis
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MAX_CLIPS: ${{ inputs.max_clips }}
          VIDEO_DURATION: ${{ steps.download.outputs.duration }}
        run: |
          echo "🧠 Analyzing transcript for viral moments using sliding window and 2-pass scoring..."

          python3 << 'PYTHON_SCRIPT'
          import json, os, requests, sys, time

          groq_key = os.environ["GROQ_API_KEY"]
          max_clips = int(os.environ.get("MAX_CLIPS", "10"))
          video_duration = float(os.environ.get("VIDEO_DURATION", "0") or "0")

          with open("workspace/audio/full_captions.json") as f:
              captions = json.load(f)

          print(f"📄 Caption words loaded: {len(captions)}")

          if not captions:
              print("❌ Empty captions — cannot analyze")
              sys.exit(1)

          def call_groq_with_retry(prompt, is_json=False, max_retries=3):
              for attempt in range(max_retries + 1):
                  try:
                      response = requests.post(
                          "https://api.groq.com/openai/v1/chat/completions",
                          headers={
                              "Authorization": f"Bearer {groq_key}",
                              "Content-Type": "application/json"
                          },
                          json={
                              "model": "llama-3.3-70b-versatile",
                              "messages": [
                                  {"role": "system", "content": "You are a viral content expert. Return ONLY valid JSON." if is_json else "You are a viral content expert."},
                                  {"role": "user", "content": prompt}
                              ],
                              "temperature": 0.7,
                              "max_tokens": 4096,
                              "response_format": {"type": "json_object"} if is_json else None
                          },
                          timeout=120
                      )
                      
                      if response.status_code == 200:
                          return response.json()["choices"][0]["message"]["content"]
                      
                      if response.status_code in [429, 500, 502, 503] and attempt < max_retries:
                          wait = 2 ** attempt * 5
                          print(f"  ⚠️ Groq returned {response.status_code}, retrying in {wait}s (attempt {attempt + 1}/{max_retries})")
                          time.sleep(wait)
                          continue
                      
                      raise Exception(f"Groq API error {response.status_code}: {response.text[:300]}")
                  except Exception as e:
                      if attempt < max_retries:
                          wait = 2 ** attempt * 5
                          print(f"  ⚠️ Error calling Groq: {e}, retrying in {wait}s (attempt {attempt + 1}/{max_retries})")
                          time.sleep(wait)
                      else:
                          raise e

          # 1. Prepare sliding windows
          WINDOW_SIZE = 6000
          OVERLAP = 1000

          transcript_text = ""
          char_to_time = []
          for c in captions:
              start_char = len(transcript_text)
              word = c['text'] + " "
              transcript_text += word
              for i in range(len(word)):
                  char_to_time.append(c['startMs'] / 1000.0)

          def get_time(char_idx):
              if char_idx >= len(char_to_time): return char_to_time[-1] if char_to_time else 0
              if char_idx < 0: return 0
              return char_to_time[char_idx]

          windows = []
          for i in range(0, len(transcript_text), WINDOW_SIZE - OVERLAP):
              chunk = transcript_text[i:i + WINDOW_SIZE]
              if len(chunk.strip()) < 50: continue
              start_sec = get_time(i)
              end_sec = get_time(i + len(chunk))
              windows.append({
                  'text': chunk,
                  'start_sec': start_sec,
                  'end_sec': end_sec
              })

          print(f"🪟 Created {len(windows)} sliding windows for transcript analysis.")

          all_moments = []
          duration_hint = f" The full video is {video_duration:.0f} seconds ({video_duration/60:.1f} minutes) long." if video_duration > 0 else ""

          for idx, window in enumerate(windows):
              print(f"🔍 Analyzing window {idx+1}/{len(windows)} (Time: {window['start_sec']:.1f}s - {window['end_sec']:.1f}s)")
              
              # PASS 1: Discovery
              discovery_prompt = f"""Find ALL interesting moments in this transcript section.{duration_hint}
              Be generous — include anything that MIGHT work as a standalone clip.
              Allow clip lengths to be determined dynamically by the natural context, from 15 to 120 seconds.
              
              Transcript section:
              {window['text']}
              """
              
              print("  ▶️ Running Discovery pass...")
              try:
                  candidates_text = call_groq_with_retry(discovery_prompt, is_json=False)
              except Exception as e:
                  print(f"  ❌ Failed discovery pass: {e}")
                  continue

              # PASS 2: Ranking extraction
              ranking_prompt = f"""Here are candidate moments extracted from a video transcript.
              Rank them strictly using this rubric:

              1. HOOK STRENGTH (1-20): Does it grab attention in the first 3 seconds?
              2. STANDALONE VALUE (1-20): Does the clip make sense WITHOUT the full video?
              3. EMOTIONAL PEAK (1-20): Is there humor, surprise, controversy, or deep insight?
              4. SHAREABILITY (1-20): Would someone tag a friend or repost this?
              5. COMPLETION (1-20): Does it have a natural start and end point?

              Return the top candidates as a JSON object with a "clips" key containing an array.
              Each moment must have:
              - start_time: start timestamp in seconds (float, naturally fitting the dialogue boundaries based on the text, within {window['start_sec']:.1f} to {window['end_sec']:.1f})
              - end_time: end timestamp in seconds (float, clip should be dynamically sized to fit context, 15 to 120 secs)
              - viral_score: total_score (sum of all 5 rubric points, 1-100 rating)
              - title: catchy title for the clip
              - description: brief description
              - hashtags: array of 5 relevant hashtags
              - hook: compelling first-line hook caption
              
              Candidates to rank:
              {candidates_text}
              """
              
              print("  ▶️ Running Ranking pass...")
              try:
                  ranking_json_str = call_groq_with_retry(ranking_prompt, is_json=True)
                  parsed = json.loads(ranking_json_str)
                  window_clips = parsed.get("clips", [])
                  all_moments.extend(window_clips)
              except Exception as e:
                  print(f"  ❌ Failed ranking pass: {e}")

          # Deduplicate moments that overlap significantly (> 5 seconds overlap)
          final_moments = []
          for m in all_moments:
              try:
                  m['start_time'] = float(m['start_time'])
                  m['end_time'] = float(m['end_time'])
                  m['viral_score'] = float(m.get('viral_score', 50))
              except:
                  continue
              
              is_duplicate = False
              for fm in final_moments:
                  overlap_start = max(m['start_time'], fm['start_time'])
                  overlap_end = min(m['end_time'], fm['end_time'])
                  overlap_dur = max(0, overlap_end - overlap_start)
                  if overlap_dur > 5.0:
                      # Merge/keep the highest score
                      if m['viral_score'] > fm['viral_score']:
                          fm.update(m)
                      is_duplicate = True
                      break
              if not is_duplicate:
                  final_moments.append(m)

          # ── Audio Energy Boosting (Tier 1.3) ──
          # Parse energy data and boost scores for moments with high audio energy
          import re, statistics
          energy_data = []
          try:
              with open('workspace/audio/energy.txt') as ef:
                  current_time = 0.0
                  for line in ef:
                      time_match = re.search(r'pts_time:(\d+\.?\d*)', line)
                      if time_match:
                          current_time = float(time_match.group(1))
                      rms_match = re.search(r'RMS_level=(-?\d+\.?\d*)', line)
                      if rms_match:
                          rms = float(rms_match.group(1))
                          energy_data.append({'time': current_time, 'rms_db': rms})
          except FileNotFoundError:
              print("  ⚠️ energy.txt not found — skipping energy boosting")

          if energy_data:
              rms_values = [e['rms_db'] for e in energy_data if e['rms_db'] > -100]
              if len(rms_values) >= 2:
                  mean_rms = statistics.mean(rms_values)
                  std_rms = statistics.stdev(rms_values)
                  threshold = mean_rms + std_rms
                  energy_peaks = [e for e in energy_data if e['rms_db'] > threshold]
                  print(f"🔊 Audio energy: {len(energy_peaks)} peak seconds detected (threshold: {threshold:.1f} dB)")

                  for moment in final_moments:
                      start = moment['start_time']
                      end = moment['end_time']
                      peak_count = sum(1 for p in energy_peaks if start <= p['time'] <= end)
                      energy_bonus = min(15, peak_count * 3)  # up to +15 points
                      if energy_bonus > 0:
                          old_score = moment['viral_score']
                          moment['viral_score'] = min(100, moment['viral_score'] + energy_bonus)
                          moment['energy_peaks'] = peak_count
                          print(f"  ⚡ Boosted moment at {start:.1f}s: {old_score:.0f} → {moment['viral_score']:.0f} (+{energy_bonus}, {peak_count} peaks)")
              else:
                  print("  ⚠️ Not enough energy data for peak detection")

          # Sort by score and take top N
          final_moments.sort(key=lambda m: m['viral_score'], reverse=True)
          clips = final_moments[:max_clips]

          with open("workspace/clips/viral_moments.json", "w") as f:
              json.dump({"clips": clips}, f, indent=2)

          print(f"✅ Found {len(clips)} deduplicated viral moments across entire video.")
          PYTHON_SCRIPT

      - name: Update job status → clipping
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s -X PATCH "$SUPABASE_URL/rest/v1/jobs?id=eq.${{ inputs.job_id }}" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "clipping", "progress": 50}'

      # ─────────────────────────────────────────────────────────────
      # 6. FFmpeg — Split Video into Clips + Python SRT slicing
      # ─────────────────────────────────────────────────────────────
      - name: Split video into clips
        run: |
          echo "✂️ Splitting video into clips (with silence-snapped boundaries)..."

          python3 << 'PYTHON'
          import json, subprocess, re

          with open("workspace/clips/viral_moments.json") as f:
              data = json.loads(f.read())

          moments = data.get("clips", data) if isinstance(data, dict) else data

          # Load full Caption[] array
          with open("workspace/audio/full_captions.json") as f:
              full_captions = json.load(f)

          # ── Load silence gaps (Tier 1.4) ──
          silences = []
          try:
              with open('workspace/audio/silences.txt') as sf:
                  current_start = None
                  for line in sf:
                      s_match = re.search(r'silence_start:\s*(\d+\.?\d*)', line)
                      if s_match:
                          current_start = float(s_match.group(1))
                      e_match = re.search(r'silence_end:\s*(\d+\.?\d*)', line)
                      if e_match and current_start is not None:
                          silences.append((current_start, float(e_match.group(1))))
                          current_start = None
              print(f"  🔇 Loaded {len(silences)} silence gaps for boundary snapping")
          except FileNotFoundError:
              print("  ⚠️ silences.txt not found — skipping silence snapping")

          def snap_to_silence(timestamp, direction='nearest', max_shift=3.0):
              """Snap a timestamp to the nearest silence gap within max_shift seconds."""
              if not silences:
                  return timestamp
              best = timestamp
              best_dist = float('inf')
              for s_start, s_end in silences:
                  midpoint = (s_start + s_end) / 2
                  dist = abs(midpoint - timestamp)
                  if dist < best_dist and dist <= max_shift:
                      best_dist = dist
                      best = midpoint
              return best

          def filter_captions(captions, start_sec, end_sec):
              """Filter captions to a time window and re-zero timestamps to clip start."""
              start_ms = int(start_sec * 1000)
              end_ms   = int(end_sec   * 1000)
              result = []
              for c in captions:
                  if c['startMs'] >= (start_ms - 500) and c['startMs'] < end_ms:
                      result.append({
                          'text': c['text'],
                          'startMs': c['startMs'] - start_ms,
                          'endMs':   min(c['endMs'] - start_ms, end_ms - start_ms),
                          'timestampMs': None,
                          'confidence': None
                      })
              return result

          for i, moment in enumerate(moments):
              start = float(moment["start_time"])
              end = float(moment["end_time"])

              # Snap boundaries to nearest silence gap (up to 3s shift)
              original_start, original_end = start, end
              start = snap_to_silence(start, max_shift=3.0)
              end = snap_to_silence(end, max_shift=3.0)

              # Safety: ensure minimum 10s clip after snapping
              duration = end - start
              if duration < 10:
                  end = start + max(15, original_end - original_start)
                  duration = end - start

              if start != original_start or end != original_end:
                  print(f"  🔇 Clip {i}: snapped {original_start:.1f}→{start:.1f}s, {original_end:.1f}→{end:.1f}s")

              output = f"workspace/clips/clip_{i:03d}.mp4"

              cmd = [
                  "ffmpeg", "-i", "workspace/source/source.mp4",
                  "-ss", str(start), "-t", str(duration),
                  "-c:v", "libx264", "-preset", "fast",
                  "-c:a", "aac", "-b:a", "128k",
                  "-movflags", "+faststart",
                  output, "-y", "-loglevel", "warning"
              ]

              subprocess.run(cmd, check=True)
              print(f"  ✅ Clip {i}: {start:.1f}s → {end:.1f}s ({duration:.1f}s)")

              # Update moment metadata with snapped times
              moment['start_time'] = start
              moment['end_time'] = end

              # Filter Caption[] for this clip window and write .captions.json
              clip_captions = filter_captions(full_captions, start, end)
              if clip_captions:
                  with open(f"workspace/clips/clip_{i:03d}.captions.json", "w") as f:
                      json.dump(clip_captions, f)
                  print(f"    📝 {len(clip_captions)} caption words written")
              else:
                  print(f"    ⚠️ No captions found for clip_{i:03d} ({start:.1f}s–{end:.1f}s)")

          # Save moment metadata for later Supabase insert
          with open("workspace/clips/moments_metadata.json", "w") as f:
              json.dump(moments, f, indent=2)

          print(f"✅ Split into {len(moments)} clips")
          PYTHON

      - name: Update job status → captioning
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s -X PATCH "$SUPABASE_URL/rest/v1/jobs?id=eq.${{ inputs.job_id }}" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "captioning", "progress": 65}'

      # ─────────────────────────────────────────────────────────────
      # 7. Remotion — Render Animated Captions
      # ─────────────────────────────────────────────────────────────
      - name: Render captioned clips
        working-directory: remotion-captions
        run: |
          echo "🎬 Rendering animated captions with Remotion..."

          STYLE="${{ inputs.caption_style }}"

          for clip in ../workspace/clips/clip_*.mp4; do
            BASENAME=$(basename "$clip" .mp4)
            CAPTIONS_FILE="../workspace/clips/${BASENAME}.captions.json"
            OUTPUT="../workspace/captioned/${BASENAME}_captioned.mp4"

            # Check if captions JSON exists
            if [ ! -f "$CAPTIONS_FILE" ]; then
              echo "  ⚠️ No captions for $BASENAME — copying raw clip"
              cp "$clip" "$OUTPUT"
              continue
            fi

            # Get the true duration of this clip (seconds) so Remotion renders
            # exactly the right number of frames instead of the hardcoded 10 s.
            CLIP_DURATION=$(ffprobe -v quiet -show_entries format=duration \
              -of csv=p=0 "$clip")
            DURATION_FRAMES=$(python3 -c \
              "import math; print(max(1, math.ceil(${CLIP_DURATION} * 30)))")

            # Copy video into Remotion's public/ folder so the dev server
            # can serve it at a relative URL (staticFile path).
            mkdir -p public
            cp "$clip" "public/${BASENAME}.mp4"

            python3 -c "
          import json
          captions = open('../workspace/clips/${BASENAME}.captions.json').read()
          props = {
              'videoSrc': '${BASENAME}.mp4',
              'durationInFrames': ${DURATION_FRAMES},
              'captionsData': captions,
              'captionStyle': '$STYLE',
              'backgroundColor': '#000000',
              'accentColor': '#39E508',
              'fontSize': 68
          }
          print(json.dumps(props))
          " > /tmp/remotion_props.json

            echo "  Rendering $BASENAME (${CLIP_DURATION}s → ${DURATION_FRAMES} frames) with $STYLE style..."

            npx remotion render CaptionedClip "$OUTPUT" \
              --props="$(cat /tmp/remotion_props.json)" \
              --codec=h264 \
              --video-bitrate=8M \
              --concurrency=2 \
              --log=error || {
                echo "  ⚠️ Remotion failed for $BASENAME — copying raw clip"
                cp "$clip" "$OUTPUT"
              }
          done

          echo "✅ Caption rendering complete"

      # ─────────────────────────────────────────────────────────────
      # 8. Generate Thumbnails
      # ─────────────────────────────────────────────────────────────
      - name: Generate thumbnails
        run: |
          echo "🖼️ Generating thumbnails..."

          for clip in workspace/captioned/*_captioned.mp4; do
            [ -f "$clip" ] || continue
            BASENAME=$(basename "$clip" _captioned.mp4)

            # Extract a keyframe near 2 s as thumbnail.
            # -ss before -i = fast seek (key-frame accuracy, fine for thumbnails).
            # -frames:v 1 takes exactly one frame.
            ffmpeg -ss 2 -i "$clip" -frames:v 1 -update 1 -q:v 2 \
              -vf "scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2" \
              "workspace/thumbnails/${BASENAME}_thumb.jpg" \
              -y -loglevel warning || true
          done

          echo "✅ Thumbnails generated"

      - name: Update job status → uploading
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s -X PATCH "$SUPABASE_URL/rest/v1/jobs?id=eq.${{ inputs.job_id }}" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "uploading", "progress": 80}'

      # ─────────────────────────────────────────────────────────────
      # 9. Upload to Google Drive via rclone
      # ─────────────────────────────────────────────────────────────
      - name: Setup rclone config
        env:
          RCLONE_CONF_B64: ${{ secrets.RCLONE_CONF_B64 }}
        run: |
          echo "🔧 Setting up rclone..."
          mkdir -p ~/.config/rclone
          echo "$RCLONE_CONF_B64" | base64 -d > ~/.config/rclone/rclone.conf
          echo "✅ rclone configured"

      - name: Upload to Google Drive
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          echo "☁️ Uploading to Google Drive..."

          JOB_ID="${{ inputs.job_id }}"
          REMOTE_NAME=$(rclone listremotes | head -1 | tr -d ':')

          # Upload captioned clips to Drive folder
          rclone copy workspace/captioned/ \
            "${REMOTE_NAME}:ClipMint/${JOB_ID}/clips/" \
            --drive-root-folder-id="$GDRIVE_FOLDER_ID" \
            -v

          # Upload thumbnails
          rclone copy workspace/thumbnails/ \
            "${REMOTE_NAME}:ClipMint/${JOB_ID}/thumbnails/" \
            --drive-root-folder-id="$GDRIVE_FOLDER_ID" \
            -v

          # Build upload manifest (list uploaded files with Drive links)
          python3 << PYEOF
          import json, subprocess, os

          job_id = "$JOB_ID"
          remote = "${REMOTE_NAME}"
          folder_id = os.environ["GDRIVE_FOLDER_ID"]

          # List uploaded clips
          result = subprocess.run(
              ["rclone", "lsjson", f"{remote}:ClipMint/{job_id}/clips/",
               f"--drive-root-folder-id={folder_id}"],
              capture_output=True, text=True
          )

          clips = []
          if result.returncode == 0:
              files = json.loads(result.stdout)
              for f in files:
                  if f["Name"].endswith(".mp4"):
                      file_id = f.get("ID", "")
                      # Make clip publicly accessible via rclone link
                      if file_id:
                          subprocess.run(
                              ["rclone", "link",
                               f"{remote}:ClipMint/{job_id}/clips/{f['Name']}",
                               f"--drive-root-folder-id={folder_id}"],
                              capture_output=True, text=True
                          )
                      clips.append({
                          "name": f["Name"],
                          "url": f"https://drive.google.com/file/d/{file_id}/view" if file_id else "",
                          "id": file_id
                      })

          # List uploaded thumbnails and make them publicly accessible
          thumb_result = subprocess.run(
              ["rclone", "lsjson", f"{remote}:ClipMint/{job_id}/thumbnails/",
               f"--drive-root-folder-id={folder_id}"],
              capture_output=True, text=True
          )
          thumb_map = {}  # basename -> Drive URL
          if thumb_result.returncode == 0:
              for tf in json.loads(thumb_result.stdout):
                  tid = tf.get("ID", "")
                  if tid:
                      # Make thumbnail publicly accessible via rclone link
                      link_result = subprocess.run(
                          ["rclone", "link",
                           f"{remote}:ClipMint/{job_id}/thumbnails/{tf['Name']}",
                           f"--drive-root-folder-id={folder_id}"],
                          capture_output=True, text=True
                      )
                      # thumb file is e.g. clip_000_thumb.jpg -> base = clip_000
                      base = tf["Name"].replace("_thumb.jpg", "").replace("_thumb.png", "")
                      # Use the thumbnail API for a direct-viewable image
                      thumb_map[base] = f"https://drive.google.com/thumbnail?id={tid}&sz=w540"

          # Attach thumbnail_url to each clip entry
          for c in clips:
              base = c["name"].replace("_captioned.mp4", "")
              c["thumbnail_url"] = thumb_map.get(base, "")

          manifest = {"job_id": job_id, "folder_id": folder_id, "clips": clips}
          with open("workspace/upload_manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)

          print(f"✅ Uploaded {len(clips)} clips to Google Drive")
          PYEOF

      # ─────────────────────────────────────────────────────────────
      # 10. Update Supabase Job Status + Insert Clip Records
      # ─────────────────────────────────────────────────────────────
      - name: Update job status → done + insert clips
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "📊 Updating job status in Supabase..."

          python3 << 'PYTHON'
          import json, requests, os

          supabase_url = os.environ["SUPABASE_URL"]
          service_key = os.environ["SUPABASE_SERVICE_KEY"]
          job_id = "${{ inputs.job_id }}"

          headers = {
              "apikey": service_key,
              "Authorization": f"Bearer {service_key}",
              "Content-Type": "application/json",
              "Prefer": "return=minimal"
          }

          # Load manifests
          with open("workspace/upload_manifest.json") as f:
              manifest = json.load(f)

          moments = []
          try:
              with open("workspace/clips/moments_metadata.json") as f:
                  moments = json.load(f)
          except:
              pass

          clips = manifest.get("clips", [])
          clips_count = len(clips)

          # Get user_id from the job
          job_resp = requests.get(
              f"{supabase_url}/rest/v1/jobs?id=eq.{job_id}&select=user_id",
              headers={"apikey": service_key, "Authorization": f"Bearer {service_key}"}
          )
          jobs = job_resp.json()
          user_id = jobs[0]["user_id"] if jobs else None

          if not user_id:
              print("❌ Could not find job user_id")
              exit(1)

          # Update job status to done
          from datetime import datetime, timezone
          now = datetime.now(timezone.utc).isoformat()

          requests.patch(
              f"{supabase_url}/rest/v1/jobs?id=eq.{job_id}",
              headers=headers,
              json={
                  "status": "done",
                  "progress": 100,
                  "clips_count": clips_count,
                  "drive_folder_id": manifest.get("folder_id", ""),
                  "completed_at": now
              }
          )
          print(f"✅ Job updated: status=done, clips_count={clips_count}")

          # Insert clip records with user_id
          for i, clip in enumerate(clips):
              moment = moments[i] if i < len(moments) else {}

              clip_data = {
                  "job_id": job_id,
                  "user_id": user_id,
                  "clip_index": i,
                  "filename": clip["name"],
                  "drive_file_id": clip.get("id", ""),
                  "drive_url": clip.get("url", ""),
                  "title": moment.get("title", f"Clip {i+1}"),
                  "description": moment.get("description", ""),
                  "hashtags": moment.get("hashtags", []),
                  "hook_caption": moment.get("hook", ""),
                  "viral_score": int(float(moment.get("viral_score", 50))),
                  "start_time": float(moment.get("start_time", 0)),
                  "end_time": float(moment.get("end_time", 0)),
                  "thumbnail_url": clip.get("thumbnail_url", ""),
                  "status": "ready"
              }

              resp = requests.post(
                  f"{supabase_url}/rest/v1/clips",
                  headers=headers,
                  json=clip_data
              )
              if resp.status_code in [200, 201]:
                  print(f"  ✅ Clip {i}: {clip['name']}")
              else:
                  print(f"  ⚠️ Clip {i} insert failed: {resp.status_code} {resp.text}")

          print(f"✅ Inserted {clips_count} clip records into Supabase")
          PYTHON

      # ─────────────────────────────────────────────────────────────
      # 11. Error Handling — Mark Failed on Error
      # ─────────────────────────────────────────────────────────────
      - name: Mark job as failed on error
        if: failure()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "❌ Pipeline failed — updating job status..."
          curl -s -X PATCH "$SUPABASE_URL/rest/v1/jobs?id=eq.${{ inputs.job_id }}" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "failed", "error_message": "Video processing failed. Please try again or contact support.", "progress": 0}'

      - name: Mark job as failed on cancellation
        if: cancelled()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "⚠️ Pipeline cancelled — updating job status..."
          curl -s -X PATCH "$SUPABASE_URL/rest/v1/jobs?id=eq.${{ inputs.job_id }}" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "cancelled", "error_message": "Processing was cancelled.", "progress": 0}'

      # ─────────────────────────────────────────────────────────────
      # 12. Send Notifications (Email via Resend + Discord)
      # ─────────────────────────────────────────────────────────────
      - name: Send completion notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          STATUS="${{ job.status }}"
          JOB_ID="${{ inputs.job_id }}"

          # ── Email + Discord Notification via our webhook API ──
          if [ -n "$DASHBOARD_URL" ] && [ -n "$WEBHOOK_SECRET" ]; then
            if [ "$STATUS" = "success" ]; then
              EMAIL_STATUS="done"
              ERROR_MSG=""
            elif [ "$STATUS" = "cancelled" ]; then
              EMAIL_STATUS="cancelled"
              ERROR_MSG="Processing was cancelled."
            else
              EMAIL_STATUS="failed"
              ERROR_MSG="Video processing failed. Please try again or contact support."
            fi

            echo "📧 Sending notification..."
            curl -s -X POST "${DASHBOARD_URL}/api/webhooks/job-status" \
              -H "Content-Type: application/json" \
              -d "{\"job_id\": \"${JOB_ID}\", \"status\": \"${EMAIL_STATUS}\", \"error_message\": \"${ERROR_MSG}\", \"webhook_secret\": \"${WEBHOOK_SECRET}\"}" \
              || echo "  ⚠️ Notification failed (non-critical)"
          fi

          # ── Admin Discord Notification ──
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            MSG="ClipMint job **$JOB_ID** completed successfully!"
          elif [ "$STATUS" = "cancelled" ]; then
            EMOJI="⚠️"
            MSG="ClipMint job **$JOB_ID** was cancelled."
          else
            EMOJI="❌"
            MSG="ClipMint job **$JOB_ID** failed."
          fi

          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"$EMOJI $MSG\"}"
          fi

